
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.10
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.7.2
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      - redpanda
    ports:
      - "8084:8080"

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  producer:
    build:
      context: ./producer
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC=transactions
      - PORT=8001
    depends_on:
      - redpanda
    expose:
      - "8001"

  consumer:
    build:
      context: ./consumer
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - KAFKA_TOPIC=transactions
      - MONGO_URI=mongodb://mongo:27017
      - INITIAL_BALANCE=1000000
    depends_on:
      - redpanda
      - mongo

  spark-master:
    build:
      context: ./spark
    restart: unless-stopped
    entrypoint: []
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "7077:7077"
      - "8082:8080"

  spark-worker:
    build:
      context: ./spark
    restart: unless-stopped
    entrypoint: []
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--host", "spark-worker", "--webui-port", "8081", "--cores", "1", "--memory", "1g"]
    depends_on:
      - spark-master
    ports:
      - "8083:8081"

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: unless-stopped
    command: ["standalone"]
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=fraud_db
      - MONGO_COLLECTION=transactions
      - MODEL_PATH=/model/model.pkl
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_HOST=airflow
      - SPARK_DRIVER_BIND_ADDRESS=0.0.0.0
      - TRAINING_LIMIT=1000
    depends_on:
      - mongo
      - spark-master
      - spark-worker
    volumes:
      - ./artifacts:/model
      - airflow_data:/opt/airflow
    ports:
      - "8030:8080"

  webapp:
    build:
      context: ./webapp
    restart: unless-stopped
    environment:
      - FLASK_SECRET_KEY=dev_secret_key_change_me
      - PRODUCER_URL=http://producer:8001/publish
      - FRAUD_THRESHOLD=0.65
      - MONGO_URI=mongodb://mongo:27017
      - INITIAL_BALANCE=1000000
      - MODEL_PATH=/model/model.pkl
      - PORT=5000
    depends_on:
      - producer
      - mongo
      - airflow
    volumes:
      - ./artifacts:/model
      - ./webapp/templates:/app/templates
      - ./webapp/static:/app/static
      - ./webapp/app.py:/app/app.py
    ports:
      - "5000:5000"

  dashboard:
    build:
      context: ./dashboard
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=5000
    depends_on:
      - mongo
    ports:
      - "5001:5000"

  compass-web:
    image: haohanyang/compass-web:rc
    restart: unless-stopped
    environment:
      - CW_MONGO_URI=mongodb://mongo:27017
      - CW_HOST=0.0.0.0
      - CW_PORT=8080
    depends_on:
      - mongo
    ports:
      - "8089:8080"

volumes:
  mongo_data:
  airflow_data:

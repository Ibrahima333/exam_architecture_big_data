{% extends "base.html" %}
{% block content %}
<section class="card login-card">
  <div class="card-header">
    <h2>Se connecter</h2>
    <p class="card-subtitle">Accédez à votre espace pour effectuer des transferts sécurisés.</p>
  </div>
  <form method="POST" class="form-grid">
    <div class="form-group">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" placeholder="Ex: moussa" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary btn-large">Se connecter</button>
    </div>
  </form>
</section>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Nouvelle transaction</h2>
  <p><strong>Solde disponible:</strong> {{ current_balance_label }}</p>
  <form method="POST" class="form-grid">
    <label>Bénéficiaire</label>
    <input type="text" name="recipient" placeholder="moussa" required>
    <label>Montant (FCFA)</label>
    <input type="number" step="1" min="100" name="amount" required>
    <button type="submit">Envoyer</button>
  </form>
</section>
{% endblock %}
